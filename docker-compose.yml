name: divvy-elt-pipeline

# ─────────────────────────────────────────────────────────────────────────────
# Services
#   workspace   - dev container (Python 3.11, gcloud, dbt). This is the shell
#                 VS Code / GitHub Codespaces attaches to.
#   kestra-db   - PostgreSQL 15 backend for Kestra metadata & queue.
#   kestra      - Kestra standalone server (UI + worker in one process).
#                 Port 8080 is forwarded to the browser automatically.
#                 Flows in ./kestra/flows/ are imported by import-flows.sh
#                 which runs on every Codespace start via postStartCommand.
#
# GCP credentials: two options
#   Option A (Codespaces secret, recommended):
#     Add GOOGLE_APPLICATION_CREDENTIALS_JSON as a Codespace Secret containing
#     the full JSON of your service-account key. post-create.sh writes it to
#     ./secrets/gcp-key.json automatically.
#   Option B (manual):
#     Place your key file at ./secrets/gcp-key.json before starting.
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ---------------------------------------------------------------------------
  # Dev workspace
  # NO depends_on kestra: the workspace must start immediately so Codespaces
  # can open the editor. Kestra is a background side-service. import-flows.sh
  # (postStartCommand) polls /api/v1/health and pushes flows once Kestra is
  # ready, completely independently of the workspace startup sequence.
  # ---------------------------------------------------------------------------
  workspace:
    build:
      context: .
      dockerfile: .devcontainer/Dockerfile
    container_name: divvy-workspace
    volumes:
      - .:/workspace:cached
      - /var/run/docker.sock:/var/run/docker.sock
      - workspace-venv:/workspace/.venv
    working_dir: /workspace
    environment:
      GOOGLE_APPLICATION_CREDENTIALS: /workspace/secrets/gcp-key.json
      GCP_PROJECT_ID: ${GCP_PROJECT_ID:-my-gcp-project}
      GCP_BUCKET: ${GCP_BUCKET:-my-divvy-bucket}
      BQ_DATASET: ${BQ_DATASET:-divvy_raw}
      GCP_LOCATION: ${GCP_LOCATION:-US}
      KESTRA_HOST: http://kestra:8080
    command: sleep infinity
    networks:
      - pipeline-net

  # ---------------------------------------------------------------------------
  # Kestra metadata database
  # ---------------------------------------------------------------------------
  kestra-db:
    image: postgres:15-alpine
    container_name: kestra-postgres
    environment:
      POSTGRES_DB: kestra
      POSTGRES_USER: kestra
      POSTGRES_PASSWORD: ${KESTRA_DB_PASSWORD:-kestra_dev_password}
    volumes:
      - kestra-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kestra -d kestra"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pipeline-net

  # ---------------------------------------------------------------------------
  # Kestra orchestration server
  # latest-full bundles all official plugins: GCS, BigQuery, HTTP, dbt, etc.
  # ---------------------------------------------------------------------------
  kestra:
    image: kestra/kestra:latest-full
    container_name: kestra
    command: server standalone --worker-thread=8

    environment:
      KESTRA_CONFIGURATION: |
        datasources:
          postgres:
            url: jdbc:postgresql://kestra-db:5432/kestra
            driverClassName: org.postgresql.Driver
            username: kestra
            password: ${KESTRA_DB_PASSWORD:-kestra_dev_password}
        kestra:
          server:
            basic-auth:
              enabled: false
          repository:
            type: postgres
          storage:
            type: local
            local:
              base-path: /app/kestra-storage
            # Uncomment to use GCS as the storage backend in production:
            # type: gcs
            # gcs:
            #   bucket: ${GCP_BUCKET}
            #   project-id: ${GCP_PROJECT_ID}
          queue:
            type: postgres
          tasks:
            tmp-dir:
              path: /tmp/kestra-wd/tmp
          url: http://localhost:8080/
      GOOGLE_APPLICATION_CREDENTIALS: /secrets/gcp-key.json
      GCP_PROJECT_ID: ${GCP_PROJECT_ID:-my-gcp-project}
      GCP_BUCKET: ${GCP_BUCKET:-my-divvy-bucket}
      BQ_DATASET: ${BQ_DATASET:-divvy_raw}

    volumes:
      # Flows are pushed via the REST API by import-flows.sh on each start.
      # This bind-mount is kept as a handy reference / manual fallback.
      - ./kestra/flows:/kestra-flows:ro
      - kestra-storage:/app/kestra-storage
      - kestra-tmp:/tmp/kestra-wd
      # GCP key: post-create.sh guarantees this file exists (real key or
      # placeholder) before any service starts, so the bind never fails.
      - ./secrets/gcp-key.json:/secrets/gcp-key.json:ro

    ports:
      - "8080:8080"
      - "8081:8081"

    depends_on:
      kestra-db:
        condition: service_healthy

    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/api/v1/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      # start_period gives Kestra time to initialise its DB schema and plugins
      # before the healthcheck starts failing. latest-full is ~2 GB and slow
      # to boot on first pull; 90 s is conservative but reliable.
      start_period: 90s

    networks:
      - pipeline-net

# ─────────────────────────────────────────────────────────────────────────────
volumes:
  kestra-db-data:
  kestra-storage:
  kestra-tmp:
  workspace-venv:

networks:
  pipeline-net:
    driver: bridge
